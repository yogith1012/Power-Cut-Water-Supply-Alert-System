<!DOCTYPE html>
<html>
<head>
    <title>CRUD Form Development</title>
</head>
<body>

    <h1>Power Cut & Water Supply Alert System</h1>

    <h2>CRUD Form Development</h2>

    <form>

        <label>User Name:</label><br>
        <input type="text" placeholder="Enter User Name"><br><br>

        <label>Area:</label><br>
        <input type="text" placeholder="Enter Area Name"><br><br>

        <label>Issue Type:</label><br>
        <select>
            <option>Power Cut</option>
            <option>Water Supply Issue</option>
        </select><br><br>

        <label>Description:</label><br>
        <textarea rows="4" cols="30" placeholder="Enter Issue Description"></textarea><br><br>

        <button>Create</button>
        <button>Read</button>
        <button>Update</button>
        <button>Delete</button>

    </form>

</body>
</html>
