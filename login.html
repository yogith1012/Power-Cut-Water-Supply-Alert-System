<!DOCTYPE html>
<html>

<head>
    <title>Login - Power Cut & Water Supply Alert System</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>⚡ Power Cut & Water Supply Alert System</h1>

    <hr>

    <h2>User Login</h2>

    <form id="loginForm">

        <label>Email</label><br>
        <input type="email"
               id="email"
               placeholder="Enter Email"
               required>

        <br><br>

        <label>Password</label><br>
        <input type="password"
               id="password"
               placeholder="Enter Password"
               required>

        <br><br>

        <button type="submit">Login</button>

    </form>

    <br>

    <p id="message"></p>

    <br>

    <p>
        Don't have an account?
        <a href="register.html">Register Here</a>
    </p>

    <script src="script.js"></script>

</body>

</html>
